<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Buy-In Tracker</title>
<style>
  :root {
    --bg: #0f1724;
    --panel: #182233;
    --panel-2: #1f2b40;
    --border: #2c3a52;
    --text: #e6edf5;
    --muted: #8ea0b8;
    --accent: #2fae6b;
    --accent-dark: #1f8a52;
    --danger: #d9534f;
    --danger-dark: #b94440;
    --gold: #e0b84a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .panel h2 {
    font-size: 1rem;
    margin: 0 0 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  label {
    font-size: 0.85rem;
    color: var(--muted);
  }
  input[type="text"], input[type="number"] {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 1rem;
    width: 100%;
  }
  input:focus { outline: 2px solid var(--accent); }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    padding: 10px 14px;
    color: #fff;
    background: var(--accent);
    transition: background 0.15s ease;
  }
  button:hover { background: var(--accent-dark); }
  button.secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover { background: #28344a; }
  button.danger { background: var(--danger); }
  button.danger:hover { background: var(--danger-dark); }
  button.icon {
    padding: 6px 10px;
    font-size: 1.1rem;
    line-height: 1;
  }
  .buyin-value-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .buyin-value-row input { max-width: 140px; }
  .add-player-row {
    display: flex;
    gap: 8px;
  }
  .add-player-row input { flex: 1; }
  .add-player-row button { flex-shrink: 0; }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    text-align: left;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; }
  .player-name { font-weight: 600; }
  .count-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .count-controls button {
    width: 30px;
    height: 30px;
    padding: 0;
    border-radius: 6px;
    font-size: 1rem;
  }
  .count-num {
    min-width: 22px;
    text-align: center;
    font-weight: 600;
  }
  .cashout-input {
    width: 90px;
  }
  .earn {
    font-weight: 700;
    text-align: right;
    white-space: nowrap;
  }
  .earn.positive { color: var(--accent); }
  .earn.negative { color: var(--danger); }
  .earn.zero { color: var(--muted); }
  .remove-btn {
    background: transparent;
    color: var(--muted);
    padding: 4px 8px;
    font-size: 1rem;
  }
  .remove-btn:hover { background: var(--panel-2); color: var(--danger); }
  .empty-state {
    color: var(--muted);
    text-align: center;
    padding: 20px;
    font-size: 0.9rem;
  }
  .totals {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  .totals strong { color: var(--text); }
  .balance-warning {
    color: var(--gold);
  }
  .actions-row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 16px;
  }
  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 24px;
  }
  @media (max-width: 480px) {
    th:nth-child(2), td:nth-child(2) { display: none; }
    .cashout-input { width: 70px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Poker Buy-In Tracker</h1>
  <div class="subtitle">Track buy-ins, cash everyone out, see who wins and who loses.</div>

  <div class="panel">
    <h2>Buy-in value</h2>
    <div class="buyin-value-row">
      <label for="buyinValue">$ per buy-in</label>
      <input type="number" id="buyinValue" min="0" step="0.01" value="20">
    </div>
  </div>

  <div class="panel">
    <h2>Add player</h2>
    <div class="add-player-row">
      <input type="text" id="newPlayerName" placeholder="Player name" maxlength="30">
      <button id="addPlayerBtn">Add Player</button>
    </div>
  </div>

  <div class="panel">
    <h2>Players</h2>
    <div id="playersTableWrap">
      <table id="playersTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Buy-ins</th>
            <th>Cash-out</th>
            <th class="earn">Net</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="playersBody"></tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display:none;">No players yet. Add one above.</div>
    </div>
    <div class="totals">
      <span>Total buy-ins: <strong id="totalBuyins">$0</strong></span>
      <span>Total cash-out: <strong id="totalCashout">$0</strong></span>
    </div>
    <div class="totals" id="balanceRow" style="display:none;">
      <span class="balance-warning" id="balanceMsg"></span>
    </div>
  </div>

  <div class="actions-row">
    <button class="secondary" id="newGameBtn">New Game (reset buy-ins &amp; cash-outs)</button>
    <button class="danger" id="clearAllBtn">Clear All Data</button>
  </div>

  <div class="footer-note">Data is saved automatically in this browser (localStorage).</div>
</div>

<script src="app.js"></script>
<script>
(function () {
  const STORAGE_KEY = PokerApp.STORAGE_KEY;

  /** @type {{buyinValue: number, players: {id: string, name: string, buyins: number, cashout: number|null}[]}} */
  let state = loadState();

  const buyinValueInput = document.getElementById('buyinValue');
  const newPlayerNameInput = document.getElementById('newPlayerName');
  const addPlayerBtn = document.getElementById('addPlayerBtn');
  const playersBody = document.getElementById('playersBody');
  const emptyState = document.getElementById('emptyState');
  const totalBuyinsEl = document.getElementById('totalBuyins');
  const totalCashoutEl = document.getElementById('totalCashout');
  const balanceRow = document.getElementById('balanceRow');
  const balanceMsg = document.getElementById('balanceMsg');
  const newGameBtn = document.getElementById('newGameBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const normalized = PokerApp.normalizeLoadedState(JSON.parse(raw));
        if (normalized) return normalized;
      }
    } catch (e) {
      console.warn('Failed to load saved data, starting fresh.', e);
    }
    return PokerApp.defaultState();
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, PokerApp.serializeState(state));
  }

  const fmtMoney = PokerApp.fmtMoney;

  function render() {
    buyinValueInput.value = state.buyinValue;

    playersBody.innerHTML = '';
    emptyState.style.display = state.players.length === 0 ? 'block' : 'none';

    state.players.forEach(player => {
      const net = PokerApp.computePlayerNet(player, state.buyinValue);

      const tr = document.createElement('tr');

      const nameTd = document.createElement('td');
      nameTd.className = 'player-name';
      nameTd.textContent = player.name;
      tr.appendChild(nameTd);

      const countTd = document.createElement('td');
      const countWrap = document.createElement('div');
      countWrap.className = 'count-controls';
      const minusBtn = document.createElement('button');
      minusBtn.className = 'secondary';
      minusBtn.textContent = '-';
      minusBtn.disabled = player.buyins <= 0;
      minusBtn.addEventListener('click', () => {
        if (player.buyins > 0) {
          player.buyins -= 1;
          saveState();
          render();
        }
      });
      const countNum = document.createElement('span');
      countNum.className = 'count-num';
      countNum.textContent = player.buyins;
      const plusBtn = document.createElement('button');
      plusBtn.textContent = '+';
      plusBtn.addEventListener('click', () => {
        player.buyins += 1;
        saveState();
        render();
      });
      countWrap.appendChild(minusBtn);
      countWrap.appendChild(countNum);
      countWrap.appendChild(plusBtn);
      countTd.appendChild(countWrap);
      tr.appendChild(countTd);

      const cashoutTd = document.createElement('td');
      const cashoutInput = document.createElement('input');
      cashoutInput.type = 'number';
      cashoutInput.className = 'cashout-input';
      cashoutInput.min = '0';
      cashoutInput.step = '0.01';
      cashoutInput.placeholder = '—';
      cashoutInput.value = player.cashout === null ? '' : player.cashout;
      cashoutInput.addEventListener('input', () => {
        const val = cashoutInput.value;
        player.cashout = val === '' ? null : Number(val);
        saveState();
        renderTotalsOnly();
      });
      cashoutInput.addEventListener('blur', render);
      cashoutTd.appendChild(cashoutInput);
      tr.appendChild(cashoutTd);

      const earnTd = document.createElement('td');
      earnTd.className = 'earn ' + (net > 0 ? 'positive' : net < 0 ? 'negative' : 'zero');
      earnTd.textContent = player.cashout === null ? '—' : fmtMoney(net);
      tr.appendChild(earnTd);

      const actionsTd = document.createElement('td');
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.title = 'Remove player';
      removeBtn.addEventListener('click', () => {
        if (confirm('Remove ' + player.name + '?')) {
          state.players = state.players.filter(p => p.id !== player.id);
          saveState();
          render();
        }
      });
      actionsTd.appendChild(removeBtn);
      tr.appendChild(actionsTd);

      playersBody.appendChild(tr);
    });

    renderTotalsOnly();
  }

  function renderTotalsOnly() {
    const totals = PokerApp.computeTotals(state);
    totalBuyinsEl.textContent = fmtMoney(totals.totalBuyins);
    totalCashoutEl.textContent = fmtMoney(totals.totalCashout);

    if (totals.balanced === null) {
      balanceRow.style.display = 'none';
    } else {
      balanceRow.style.display = 'flex';
      if (totals.balanced) {
        balanceMsg.classList.remove('balance-warning');
        balanceMsg.textContent = '✓ Buy-ins and cash-outs balance.';
      } else {
        balanceMsg.classList.add('balance-warning');
        balanceMsg.textContent = totals.diff > 0
          ? `Cash-outs exceed buy-ins by ${fmtMoney(totals.diff)} — check your numbers.`
          : `Cash-outs are short of buy-ins by ${fmtMoney(Math.abs(totals.diff))} — check your numbers.`;
      }
    }
  }

  buyinValueInput.addEventListener('input', () => {
    const val = Number(buyinValueInput.value);
    state.buyinValue = Number.isFinite(val) && val >= 0 ? val : 0;
    saveState();
    render();
  });

  function addPlayer() {
    const name = newPlayerNameInput.value.trim();
    if (!name) {
      newPlayerNameInput.focus();
      return;
    }
    state.players.push(PokerApp.createPlayer(name));
    newPlayerNameInput.value = '';
    saveState();
    render();
    newPlayerNameInput.focus();
  }

  addPlayerBtn.addEventListener('click', addPlayer);
  newPlayerNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  newGameBtn.addEventListener('click', () => {
    if (state.players.length === 0) return;
    if (confirm('Start a new game? This resets everyone\'s buy-ins and cash-outs but keeps the player list.')) {
      state.players.forEach(p => { p.buyins = 0; p.cashout = null; });
      saveState();
      render();
    }
  });

  clearAllBtn.addEventListener('click', () => {
    if (confirm('Clear all players and data? This cannot be undone.')) {
      state = { buyinValue: state.buyinValue, players: [] };
      saveState();
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
